<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalGo AI - Hero Section B</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* GIẢ LẬP CÁC BIẾN SASS CỦA LONG */
        :root {
            --brand-cyan: #33d7d1;
            --brand-pink: #ff4c94;
            --brand-orange: #ff8a3d;
            --primary-gradient: linear-gradient(135deg, #33d7d1 0%, #00a8a2 100%);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: #000;
            overflow-x: hidden;
        }

        /* HERO SECTION */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            /* Ảnh nền thiên nhiên */
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Lớp phủ làm tối ảnh để nổi chữ */
        .hero-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.6));
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 1000px;
            padding: 0 20px;
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 50px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* THANH SEARCH (MẪU B) */
        .search-bar {
            display: flex;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px); /* Hiệu ứng Glassmorphism */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            padding: 10px 10px 10px 40px;
            box-shadow: var(--shadow-xl);
            margin: 0 auto;
            width: 100%;
            max-width: 900px;
            transition: transform 0.3s ease;
        }

        .search-bar:focus-within {
            transform: scale(1.02);
            border-color: var(--brand-cyan);
        }

        .search-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .search-item label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--brand-cyan);
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .search-item input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 15px;
            width: 100%;
        }

        .search-item input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .divider {
            width: 1px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 30px;
        }

        .search-btn {
            background: var(--primary-gradient);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .search-btn:hover {
            transform: rotate(15deg) scale(1.1);
            box-shadow: 0 0 20px rgba(51, 215, 209, 0.4);
        }

        /* THÔNG SỐ (STATS) */
        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-top: 60px;
        }

        .stat-box span {
            display: block;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 13px;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .search-bar {
                flex-direction: column;
                border-radius: 30px;
                padding: 20px;
            }
            .divider { display: none; }
            .search-item { width: 100%; margin-bottom: 15px; }
            .search-btn { width: 100%; border-radius: 15px; }
            .hero-stats { gap: 30px; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="container">
            <h1 class="hero-title">Book Unique Stays <br> Instantly & Enjoy</h1>
            <p class="hero-subtitle">Hệ thống AI thông minh giúp bạn lên kế hoạch chuyến đi hoàn hảo chỉ trong vài giây tại Việt Nam.</p>

            <div class="search-bar">
                <div class="search-item">
                    <label>Điểm đến</label>
                    <input type="text" placeholder="Bạn muốn đi đâu?">
                </div>
                
                <div class="divider"></div>
                
                <div class="search-item">
                    <label>Loại hình</label>
                    <input type="text" placeholder="Khách sạn, Homestay...">
                </div>

                <div class="divider"></div>

                <div class="search-item">
                    <label>Ngân sách</label>
                    <input type="text" placeholder="Mức giá dự kiến">
                </div>

                <button class="search-btn">
                    <i data-lucide="search" color="white"></i>
                </button>
            </div>

            <div class="hero-stats">
                <div class="stat-box">
                    <span>150K+</span>
                    <p>Chuyến đi</p>
                </div>
                <div class="stat-box">
                    <span>100K+</span>
                    <p>Khách hàng</p>
                </div>
                <div class="stat-box">
                    <span>4.9</span>
                    <p>Đánh giá</p>
                </div>
            </div>
        </div>
    </section>

    <script>
      lucide.createIcons();
    </script>
</body>
</html>
